version: 2

# dbt unit tests (Phase 9) — 누적→일간 델타 로직의 엣지를 정적 입력→기대 출력으로 못박는다.
# 이 로직(first-vs-last 차분 + 리셋 클램프)이 이 프로젝트의 심장이다. 실데이터가 없어도
# CI에서 로직이 조용히 바뀌면 여기서 깨진다. 입력(ref stg)은 목킹되므로 MinIO도 PG도 불필요.
unit_tests:
  - name: test_delta_first_vs_last
    model: fct_query_daily
    overrides:
      macros:
        is_incremental: false
    description: "누적 카운터의 하루 발생량 = 그날 마지막 스냅샷 - 첫 스냅샷(양 끝 차분)."
    given:
      - input: ref('stg_query_snapshot')
        rows:
          - {instance_id: 1, query_id: "q1", dt: "2026-01-01", captured_at: "2026-01-01 06:00:00", calls: 100, total_time_ms: 1000.0, query_text: "x"}
          - {instance_id: 1, query_id: "q1", dt: "2026-01-01", captured_at: "2026-01-01 12:00:00", calls: 250, total_time_ms: 2800.0, query_text: "x"}
          - {instance_id: 1, query_id: "q1", dt: "2026-01-01", captured_at: "2026-01-01 23:00:00", calls: 300, total_time_ms: 4000.0, query_text: "x"}
    expect:
      rows:
        # 300-100=200 calls, 4000-1000=3000 ms, avg=3000/200=15.0
        - {instance_id: 1, query_id: "q1", dt: "2026-01-01", delta_calls: 200, delta_total_time_ms: 3000.0, avg_latency_ms: 15.0}

  - name: test_reset_clamps_to_zero
    model: fct_query_daily
    overrides:
      macros:
        is_incremental: false
    description: "하루 중 카운터 리셋(재기동)으로 last < first면 음수 델타를 GREATEST(0,..)로 0에 클램프."
    given:
      - input: ref('stg_query_snapshot')
        rows:
          - {instance_id: 2, query_id: "q2", dt: "2026-01-01", captured_at: "2026-01-01 06:00:00", calls: 500, total_time_ms: 5000.0, query_text: "y"}
          - {instance_id: 2, query_id: "q2", dt: "2026-01-01", captured_at: "2026-01-01 23:00:00", calls: 100, total_time_ms: 1000.0, query_text: "y"}
    expect:
      rows:
        # last(100) < first(500) → 클램프 0. delta_calls=0이므로 avg_latency_ms는 NULL.
        - {instance_id: 2, query_id: "q2", dt: "2026-01-01", delta_calls: 0, delta_total_time_ms: 0.0, avg_latency_ms: null}

  - name: test_single_snapshot_day_delta_zero
    model: fct_query_daily
    overrides:
      macros:
        is_incremental: false
    description: "하루에 스냅샷이 하나뿐이면 first==last라 델타는 0(양 끝이 같은 점)."
    given:
      - input: ref('stg_query_snapshot')
        rows:
          - {instance_id: 3, query_id: "q3", dt: "2026-01-01", captured_at: "2026-01-01 09:00:00", calls: 777, total_time_ms: 9999.0, query_text: "z"}
    expect:
      rows:
        - {instance_id: 3, query_id: "q3", dt: "2026-01-01", delta_calls: 0, delta_total_time_ms: 0.0, avg_latency_ms: null}

  - name: test_rolling_window_recent_vs_prior
    model: mart_query_regression
    description: >
      롤링 윈도우(최근 7일 vs 직전 30일) 재설계 로직 고정 — Phase 10. 최신 dt 기준
      최근 창에서 악화된 쿼리만, 직전 창 평균과 비교해 랭킹한다. 두 창 모두 관측이
      있어야 하고, 최근<=직전이면(개선·동일) 제외한다.
    given:
      - input: ref('fct_query_daily')
        rows:
          # qA: 최근(02-01) 20ms vs 직전(01-10) 10ms → 악화 +100%.
          - {instance_id: 1, query_id: "qA", dt: "2026-02-01", query_text: "a", delta_calls: 200, avg_latency_ms: 20.0}
          - {instance_id: 1, query_id: "qA", dt: "2026-01-10", query_text: "a", delta_calls: 200, avg_latency_ms: 10.0}
          # qB: 최근==직전(둘 다 5ms) → 악화 아님, 제외.
          - {instance_id: 1, query_id: "qB", dt: "2026-02-01", query_text: "b", delta_calls: 200, avg_latency_ms: 5.0}
          - {instance_id: 1, query_id: "qB", dt: "2026-01-10", query_text: "b", delta_calls: 200, avg_latency_ms: 5.0}
          # qC: 직전 창만 있고 최근 창 없음 → 비교 불가, 제외.
          - {instance_id: 1, query_id: "qC", dt: "2026-01-10", query_text: "c", delta_calls: 200, avg_latency_ms: 9.0}
          # qD: 저콜(임계 100 미만)이라 애초에 fct 필터로 제외.
          - {instance_id: 1, query_id: "qD", dt: "2026-02-01", query_text: "d", delta_calls: 50, avg_latency_ms: 50.0}
          - {instance_id: 1, query_id: "qD", dt: "2026-01-10", query_text: "d", delta_calls: 50, avg_latency_ms: 1.0}
    expect:
      rows:
        - {instance_id: 1, query_id: "qA", recent_latency_ms: 20.0, prior_latency_ms: 10.0, latency_increase_ms: 10.0, latency_increase_pct: 100.0, recent_days_seen: 1, prior_days_seen: 1}

  # --- Phase 13 (C5) — 용량 예측 산식을 합성 선형 성장으로 고정 ---
  - name: test_capacity_forecast_linear_growth
    model: mart_capacity_forecast
    description: >
      20일 선형 성장(시작 1000MB, +10MB/일) + 임계 2000MB(physical) 주입 —
      기울기 regr_slope=10MB/일, 잔여일 floor((2000-1190)/10)=81, risk=d90이 나와야 한다.
      학습 게이트(14일)도 통과 상태. 산식이 지어낸 값이 아님을 기지값으로 고정한다.
    given:
      - input: ref('fct_size_daily')
        rows:
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-01", total_bytes: 1000000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-02", total_bytes: 1010000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-03", total_bytes: 1020000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-04", total_bytes: 1030000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-05", total_bytes: 1040000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-06", total_bytes: 1050000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-07", total_bytes: 1060000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-08", total_bytes: 1070000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-09", total_bytes: 1080000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-10", total_bytes: 1090000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-11", total_bytes: 1100000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-12", total_bytes: 1110000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-13", total_bytes: 1120000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-14", total_bytes: 1130000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-15", total_bytes: 1140000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-16", total_bytes: 1150000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-17", total_bytes: 1160000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-18", total_bytes: 1170000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-19", total_bytes: 1180000000}
          - {instance_id: 99, object_type: "table", object_name: "t", dt: "2026-01-20", total_bytes: 1190000000}
      - input: ref('capacity_thresholds')
        rows:
          - {instance_id: 99, threshold_bytes: 2000000000, threshold_kind: "physical"}
    expect:
      rows:
        - {instance_id: 99, days_observed: 20, learning: false, current_bytes: 1190000000,
           slope_bytes_per_day: 10000000.0, threshold_kind: "physical",
           days_to_threshold: 81, risk_flag: "d90"}

  - name: test_capacity_forecast_shrinking_no_dday
    model: mart_capacity_forecast
    description: >
      역성장(줄어드는 DB)이면 잔여일을 지어내지 않는다 — days_to_threshold NULL,
      risk=stable_or_shrinking. 음수 기울기 클램프의 산식판.
    given:
      - input: ref('fct_size_daily')
        rows:
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-01", total_bytes: 2000000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-02", total_bytes: 1990000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-03", total_bytes: 1980000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-04", total_bytes: 1970000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-05", total_bytes: 1960000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-06", total_bytes: 1950000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-07", total_bytes: 1940000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-08", total_bytes: 1930000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-09", total_bytes: 1920000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-10", total_bytes: 1910000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-11", total_bytes: 1900000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-12", total_bytes: 1890000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-13", total_bytes: 1880000000}
          - {instance_id: 98, object_type: "table", object_name: "t", dt: "2026-01-14", total_bytes: 1870000000}
      - input: ref('capacity_thresholds')
        rows:
          - {instance_id: 98, threshold_bytes: 3000000000, threshold_kind: "physical"}
    expect:
      rows:
        - {instance_id: 98, days_observed: 14, learning: false,
           days_to_threshold: null, risk_flag: "stable_or_shrinking"}

  - name: test_capacity_forecast_volume_fallback
    model: mart_capacity_forecast
    description: >
      seed(원천 ①)가 없을 때 기종이 보고한 상한(원천 ② — fct의 max_bytes)이 임계로
      폴백되고 kind='volume_reported'가 되는지. 둘 다 없으면 growth_only(기존 테스트와 대칭).
    given:
      - input: ref('fct_size_daily')
        rows:
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-01", total_bytes: 1000000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-02", total_bytes: 1010000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-03", total_bytes: 1020000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-04", total_bytes: 1030000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-05", total_bytes: 1040000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-06", total_bytes: 1050000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-07", total_bytes: 1060000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-08", total_bytes: 1070000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-09", total_bytes: 1080000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-10", total_bytes: 1090000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-11", total_bytes: 1100000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-12", total_bytes: 1110000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-13", total_bytes: 1120000000, max_bytes: 2000000000}
          - {instance_id: 97, object_type: "table", object_name: "t", dt: "2026-01-14", total_bytes: 1130000000, max_bytes: 2000000000}
      - input: ref('capacity_thresholds')
        rows: []
    expect:
      rows:
        - {instance_id: 97, learning: false, threshold_bytes: 2000000000,
           threshold_kind: "volume_reported", days_to_threshold: 87, risk_flag: "d90"}

  # --- Phase 16 (G1~G3) — 플랜 회귀 판정 산식을 합성 뒤집힘으로 고정 ---
  - name: test_plan_regression_flip_regressed
    model: mart_plan_regression
    description: >
      A→B 뒤집힘(01-10) 후 지연이 10ms→30ms(3배)로 악화 + 후 호출 500(임계 200 초과) →
      REGRESSED. 대표 플랜 lag 검출 + 전/후 N일(기본 3) 평균 비교 + 비율 고정을 못박는다.
    given:
      - input: ref('stg_plan_snapshot')
        rows:
          - {instance_id: 1, query_id: "q1", plan_hash: "A", captured_at: "2026-01-09 12:00:00", dt: "2026-01-09"}
          - {instance_id: 1, query_id: "q1", plan_hash: "B", captured_at: "2026-01-10 12:00:00", dt: "2026-01-10"}
      - input: ref('fct_query_daily')
        rows:
          - {instance_id: 1, query_id: "q1", dt: "2026-01-09", avg_latency_ms: 10.0, delta_calls: 500}
          - {instance_id: 1, query_id: "q1", dt: "2026-01-11", avg_latency_ms: 30.0, delta_calls: 500}
      - input: ref('plan_regression_thresholds')
        rows:
          - {instance_id: 1, regress_ratio: 1.5, min_after_calls: 200}
    expect:
      rows:
        - {instance_id: 1, query_id: "q1", flip_dt: "2026-01-10", prev_plan_hash: "A", new_plan_hash: "B",
           before_avg_ms: 10.0, after_avg_ms: 30.0, latency_ratio: 3.0,
           before_days: 1, after_days: 1, after_calls: 500, verdict: "REGRESSED"}

  - name: test_plan_regression_pending_no_after
    model: mart_plan_regression
    description: >
      뒤집힘 후 관측이 아직 없으면(after_days=0) 지어내지 않고 PENDING — 매일 재계산되며
      후 N일이 차면 자연 확정된다. 전역 기본 임계(seed 없음)로도 동작.
    given:
      - input: ref('stg_plan_snapshot')
        rows:
          - {instance_id: 2, query_id: "q2", plan_hash: "A", captured_at: "2026-01-09 12:00:00", dt: "2026-01-09"}
          - {instance_id: 2, query_id: "q2", plan_hash: "B", captured_at: "2026-01-10 12:00:00", dt: "2026-01-10"}
      - input: ref('fct_query_daily')
        rows:
          - {instance_id: 2, query_id: "q2", dt: "2026-01-09", avg_latency_ms: 10.0, delta_calls: 500}
      - input: ref('plan_regression_thresholds')
        rows: []
    expect:
      rows:
        - {instance_id: 2, query_id: "q2", flip_dt: "2026-01-10",
           before_days: 1, after_days: 0, verdict: "PENDING"}

  - name: test_plan_regression_ambiguous_adjacent_flip
    model: mart_plan_regression
    description: >
      같은 쿼리가 비교창(±N일) 안에서 또 뒤집히면(A→B→C, 2일 간격) 전/후가 다른 뒤집힘에
      오염되므로 판정을 지어내지 않고 AMBIGUOUS. 관측은 충분(PENDING 아님)해야 이 분기로 온다.
    given:
      - input: ref('stg_plan_snapshot')
        rows:
          - {instance_id: 3, query_id: "q3", plan_hash: "A", captured_at: "2026-01-09 12:00:00", dt: "2026-01-09"}
          - {instance_id: 3, query_id: "q3", plan_hash: "B", captured_at: "2026-01-10 12:00:00", dt: "2026-01-10"}
          - {instance_id: 3, query_id: "q3", plan_hash: "C", captured_at: "2026-01-12 12:00:00", dt: "2026-01-12"}
      - input: ref('fct_query_daily')
        rows:
          - {instance_id: 3, query_id: "q3", dt: "2026-01-09", avg_latency_ms: 10.0, delta_calls: 500}
          - {instance_id: 3, query_id: "q3", dt: "2026-01-11", avg_latency_ms: 12.0, delta_calls: 500}
          - {instance_id: 3, query_id: "q3", dt: "2026-01-13", avg_latency_ms: 12.0, delta_calls: 500}
      - input: ref('plan_regression_thresholds')
        rows: []
    expect:
      rows:
        - {instance_id: 3, query_id: "q3", flip_dt: "2026-01-10", verdict: "AMBIGUOUS"}
        - {instance_id: 3, query_id: "q3", flip_dt: "2026-01-12", verdict: "AMBIGUOUS"}

  # --- Phase 16 (G4) — 백업 공백(RPO) 판정 ---
  - name: test_backup_rpo_ok_breach_missing
    model: mart_backup_rpo
    description: >
      기준일=창고 max dt(01-10, fct_query_daily에서). inst1 최근 성공(gap 1, 임계 3)→ok,
      inst2 오래된 성공(gap 9)→breach, inst3 실패만 있고 성공 관측 없음→no_backup_observed.
      유니버스를 query 팩트에서 잡아 백업 기록 부재도 행으로 드러나는 것(left join)을 못박는다.
    given:
      - input: ref('fct_query_daily')
        rows:
          - {instance_id: 1, dt: "2026-01-10"}
          - {instance_id: 2, dt: "2026-01-10"}
          - {instance_id: 3, dt: "2026-01-10"}
      - input: ref('fct_backup_daily')
        rows:
          - {instance_id: 1, dt: "2026-01-09", success_runs: 1, verified_runs: 1}
          - {instance_id: 2, dt: "2026-01-01", success_runs: 1, verified_runs: 0}
          - {instance_id: 3, dt: "2026-01-05", success_runs: 0, verified_runs: 0}
      - input: ref('backup_rpo_thresholds')
        rows: []
    expect:
      rows:
        - {instance_id: 1, as_of_dt: "2026-01-10", last_success_dt: "2026-01-09", gap_days: 1,
           no_successful_backup: false, rpo_status: "ok"}
        - {instance_id: 2, as_of_dt: "2026-01-10", last_success_dt: "2026-01-01", gap_days: 9,
           no_successful_backup: false, rpo_status: "breach"}
        - {instance_id: 3, as_of_dt: "2026-01-10", last_success_dt: null, gap_days: null,
           no_successful_backup: true, rpo_status: "no_backup_observed"}

  # 인덱스 일간 사용 델타 — scan_count 누적을 first-vs-last로 접는다(fct_query_daily와 같은 심장).
  - name: test_index_daily_delta
    model: fct_index_daily
    overrides:
      macros:
        is_incremental: false
    description: "인덱스 스캔 누적의 하루 사용 = 그날 마지막 - 첫 스냅샷(양 끝 차분)."
    given:
      - input: ref('stg_index_usage_snapshot')
        rows:
          - {instance_id: 1, table_name: "orders", index_name: "idx_a", dt: "2026-01-01", captured_at: "2026-01-01 06:00:00", scan_count: 100, size_bytes: 4096, is_unique: false}
          - {instance_id: 1, table_name: "orders", index_name: "idx_a", dt: "2026-01-01", captured_at: "2026-01-01 23:00:00", scan_count: 340, size_bytes: 4096, is_unique: false}
    expect:
      rows:
        - {instance_id: 1, table_name: "orders", index_name: "idx_a", dt: "2026-01-01", delta_scans: 240, size_bytes: 4096, is_unique: false}

  # 재기동으로 카운터 리셋(last < first)이면 음수 델타를 0에 클램프.
  - name: test_index_daily_reset_clamp
    model: fct_index_daily
    overrides:
      macros:
        is_incremental: false
    description: "하루 중 통계 리셋으로 last(50) < first(900)이면 GREATEST(0,..)로 0 클램프."
    given:
      - input: ref('stg_index_usage_snapshot')
        rows:
          - {instance_id: 2, table_name: "t", index_name: "idx_b", dt: "2026-01-01", captured_at: "2026-01-01 06:00:00", scan_count: 900, size_bytes: 8192, is_unique: false}
          - {instance_id: 2, table_name: "t", index_name: "idx_b", dt: "2026-01-01", captured_at: "2026-01-01 23:00:00", scan_count: 50, size_bytes: 8192, is_unique: false}
    expect:
      rows:
        - {instance_id: 2, table_name: "t", index_name: "idx_b", dt: "2026-01-01", delta_scans: 0, size_bytes: 8192, is_unique: false}

  # 미사용 인덱스 판정 4갈래 — 사용중/유니크제외/관측부족/삭제후보. 앵커=최신 dt(2026-04-01), 창 90일·하한 60일.
  - name: test_index_verdict_four_ways
    model: mart_index_verdict
    description: >
      in_use(스캔>0), constraint_backed(유니크·미사용), insufficient_observation(관측<60일),
      candidate_unused(비유니크·충분관측·사용0)를 기지 입력으로 고정.
    given:
      - input: ref('fct_index_daily')
        rows:
          # idx_hot: 사용 있음 → in_use (관측 짧아도 사용중이 우선)
          - {instance_id: 1, table_name: "t", index_name: "idx_hot", dt: "2026-04-01", delta_scans: 500, size_bytes: 4096, is_unique: false}
          # idx_pk: 유니크·미사용 → constraint_backed
          - {instance_id: 1, table_name: "t", index_name: "idx_pk", dt: "2026-01-15", delta_scans: 0, size_bytes: 8192, is_unique: true}
          - {instance_id: 1, table_name: "t", index_name: "idx_pk", dt: "2026-04-01", delta_scans: 0, size_bytes: 8192, is_unique: true}
          # idx_new: 비유니크·미사용·관측 짧음(같은 날뿐, 0일<60) → insufficient_observation
          - {instance_id: 1, table_name: "t", index_name: "idx_new", dt: "2026-04-01", delta_scans: 0, size_bytes: 2048, is_unique: false}
          # idx_dead: 비유니크·미사용·관측 76일(01-15~04-01>=60) → candidate_unused
          - {instance_id: 1, table_name: "t", index_name: "idx_dead", dt: "2026-01-15", delta_scans: 0, size_bytes: 2048, is_unique: false}
          - {instance_id: 1, table_name: "t", index_name: "idx_dead", dt: "2026-04-01", delta_scans: 0, size_bytes: 2048, is_unique: false}
    expect:
      rows:
        - {instance_id: 1, table_name: "t", index_name: "idx_hot",  total_scans: 500, observation_days: 0,  is_unique: false, verdict: "in_use"}
        - {instance_id: 1, table_name: "t", index_name: "idx_pk",   total_scans: 0,   observation_days: 76, is_unique: true,  verdict: "constraint_backed"}
        - {instance_id: 1, table_name: "t", index_name: "idx_new",  total_scans: 0,   observation_days: 0,  is_unique: false, verdict: "insufficient_observation"}
        - {instance_id: 1, table_name: "t", index_name: "idx_dead", total_scans: 0,   observation_days: 76, is_unique: false, verdict: "candidate_unused"}

  # --- Phase 18 신설·19 확장 — 변경 영향 상관(플랜 뒤집힘 + 지연 상승 두 축) ---
  - name: test_change_impact_regression_follows
    model: mart_config_impact
    description: >
      변경(01-10) 뒤 N일(기본 7) 안에 같은 인스턴스에서 REGRESSED 뒤집힘(01-12)이 관측되면
      followed_by_regression. 창 밖(01-20)은 안 센다. 신호 전무면 no_signal. 소스는 통합
      스트림(int_change_events), 지연 없어도(fct_query_daily 빈 입력) 플랜 축으로 판정.
    given:
      - input: ref('int_change_events')
        rows:
          - {instance_id: 1, change_dt: "2026-01-10", change_source: "config", change_key: "work_mem", old_value: "4MB", new_value: "1MB", change_kind: "CHANGED"}
          - {instance_id: 2, change_dt: "2026-01-10", change_source: "config", change_key: "max_connections", old_value: "100", new_value: "200", change_kind: "CHANGED"}
      - input: ref('mart_plan_regression')
        rows:
          - {instance_id: 1, flip_dt: "2026-01-12", verdict: "REGRESSED"}
          - {instance_id: 1, flip_dt: "2026-01-20", verdict: "REGRESSED"}
      - input: ref('fct_query_daily')
        rows: []
    expect:
      rows:
        - {instance_id: 1, change_dt: "2026-01-10", change_key: "work_mem", plan_flips_after: 1, regressed_after: 1, correlation: "followed_by_regression"}
        - {instance_id: 2, change_dt: "2026-01-10", change_key: "max_connections", plan_flips_after: 0, regressed_after: 0, correlation: "no_signal"}

  - name: test_change_impact_latency_rise
    model: mart_config_impact
    description: >
      플랜이 안 뒤집혀도(뒤집힘 입력 없음) 변경 전후 평균 지연이 임계(기본 1.3배) 이상 오르면
      followed_by_latency_rise. 19단계 축 확장 — 플랜 이력이 얕아도 켜지는 지연 축을 고정.
      전 10ms(01-09) → 후 20ms(01-11), 비율 2.0.
    given:
      - input: ref('int_change_events')
        rows:
          - {instance_id: 3, change_dt: "2026-01-10", change_source: "config", change_key: "shared_buffers", old_value: "128MB", new_value: "64MB", change_kind: "CHANGED"}
      - input: ref('mart_plan_regression')
        rows: []
      - input: ref('fct_query_daily')
        rows:
          - {instance_id: 3, dt: "2026-01-09", avg_latency_ms: 10.0}
          - {instance_id: 3, dt: "2026-01-11", avg_latency_ms: 20.0}
    expect:
      rows:
        - {instance_id: 3, change_dt: "2026-01-10", change_key: "shared_buffers", plan_flips_after: 0, regressed_after: 0,
           before_latency_ms: 10.0, after_latency_ms: 20.0, latency_ratio: 2.0, correlation: "followed_by_latency_rise"}
