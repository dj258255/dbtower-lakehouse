version: 2

# 데이터 계약(dbt contracts, Phase 9) — 마트 스키마를 계약으로 못박는다.
# contract.enforced: true면 dbt가 CREATE TABLE에 컬럼 이름·타입·제약을 실제로 선언하고,
# 모델이 만들어내는 컬럼/타입이 이 선언과 어긋나면 빌드를 막는다(발행 전 마지막 방어선).
# dbt-duckdb는 constraint를 DB 레벨로 실제 enforce하므로, 클램프 불변식(delta >= 0)까지
# 데이터베이스가 강제한다. 타입은 실측(DESCRIBE)한 DuckDB 산출 타입 그대로다 —
# 누적 카운터 SUM이 HUGEINT로 승격되는 것까지 계약에 반영한다.
models:
  - name: fct_query_daily
    description: >
      인스턴스+쿼리별 일간 발생량 팩트. 누적 카운터를 하루 양 끝 차분(리셋 클램프)
      으로 만들어 delta_calls/delta_total_time_ms/avg_latency_ms를 낸다.
    config:
      contract:
        enforced: true
    columns:
      - name: instance_id
        data_type: bigint
        description: "database_instance FK."
        constraints:
          - type: not_null
        tests:
          - not_null
          # 팩트의 모든 인스턴스는 staging에 존재해야 한다(계보 무결성).
          - relationships:
              arguments:
                to: ref('stg_query_snapshot')
                field: instance_id
      - name: query_id
        data_type: varchar
        description: "쿼리 지문 해시."
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: dt
        data_type: date
        description: "논리 날짜(date)."
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: query_text
        data_type: varchar
        description: "쿼리문(마지막 관측값)."
      - name: delta_calls
        data_type: hugeint
        description: "하루 발생 호출수(누적 카운터 차분, 리셋은 0 클램프). SUM(BIGINT)→HUGEINT."
        constraints:
          - type: not_null
          # 클램프 불변식을 DB가 강제 — 음수 델타가 마트에 스며들면 발행이 막힌다.
          - type: check
            expression: "delta_calls >= 0"
        tests:
          - not_null
      - name: delta_total_time_ms
        data_type: double
        description: "하루 발생 총 실행시간 ms(리셋 클램프)."
        constraints:
          - type: not_null
          - type: check
            expression: "delta_total_time_ms >= 0"
        tests:
          - not_null
      - name: avg_latency_ms
        data_type: double
        description: "delta_total_time_ms / delta_calls. delta_calls=0이면 NULL."

  - name: mart_query_regression
    description: >
      롤링 윈도우(최근 N일 vs 직전 M일) 평균 지연이 악화된 쿼리 랭킹 — Phase 10 재설계.
      전체 이력 첫날/마지막날이 아니라 최신 dt 기준 미끄러지는 창으로 비교해,
      이력이 길어져도 '지난달 대비'의 의미를 유지한다.
    config:
      contract:
        enforced: true
    columns:
      - name: instance_id
        data_type: bigint
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: query_id
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: query_text
        data_type: varchar
      - name: recent_from_dt
        data_type: date
        description: "최근 창의 시작 dt(관측된 것 기준)."
      - name: recent_to_dt
        data_type: date
        description: "최근 창의 끝 dt(= 데이터 최신 dt)."
      - name: recent_days_seen
        data_type: bigint
        description: "최근 창에서 실제 관측된 dt 수."
      - name: prior_days_seen
        data_type: bigint
        description: "직전 창에서 실제 관측된 dt 수."
      - name: prior_latency_ms
        data_type: double
        description: "직전 창 평균 지연(일별 avg_latency의 평균)."
      - name: recent_latency_ms
        data_type: double
        description: "최근 창 평균 지연."
      - name: latency_increase_ms
        data_type: double
        description: "recent_latency_ms - prior_latency_ms(항상 양수: 악화만 남김)."
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: latency_increase_pct
        data_type: double
      - name: recent_delta_calls
        data_type: hugeint

  # --- Phase 14 (D5·D6) — 시간대 팩트와 장기 베이스라인 ---
  # 계약(contract)은 되쓰기 경계 산출물인 mart_baseline_longterm에만 건다 —
  # DBTower(D8)가 소비하는 스키마라 어긋나면 빌드에서 막혀야 한다.
  # fct_query_hourly는 내부 중간 팩트라 테스트만(과계약 지양).
  - name: fct_query_hourly
    description: >
      인스턴스+쿼리별 시간대 발생량 팩트(Phase 14 D5). fct_query_daily와 같은
      양 끝 차분·리셋 클램프를 (dt, hour) 창으로 적용. 한 시간에 스냅샷 1개면
      델타 0(정직한 한계 — 과대계상보다 낫다). 장기 베이스라인(D6)의 재료.
    columns:
      - name: instance_id
        description: "database_instance FK."
        tests:
          - not_null
      - name: query_id
        description: "쿼리 지문 해시."
        tests:
          - not_null
      - name: dt
        description: "논리 날짜(UTC)."
        tests:
          - not_null
      - name: hour
        description: "captured_at의 시(0-23, UTC)."
        tests:
          - not_null
      - name: delta_calls
        description: "시간대 호출 증가량(리셋 클램프 >= 0)."
      - name: delta_total_time_ms
        description: "시간대 누적시간 증가량 ms(클램프 >= 0)."
      - name: avg_latency_ms
        description: "delta_time/delta_calls. 호출 0이면 NULL."

  - name: mart_baseline_longterm
    description: >
      장기 요일x시간대 베이스라인(Phase 14 D6) — 되쓰기(D7)로 DBTower
      baseline_longterm 테이블에 실려 7일 창 이상감지의 주간 계절성 오탐을 줄인다.
      지표는 시간당 delta_calls. dow는 UTC 기준(DuckDB dayofweek: 일=0..토=6).
      min_observations(기본 8)·인스턴스별 top-K(기본 500) 가드 — 잘린 쿼리는
      "장기 없음 -> DBTower 현행 7일 창 폴백"이 계약이지 오류가 아니다.
    config:
      contract:
        enforced: true
    columns:
      - name: instance_id
        data_type: bigint
        description: "database_instance FK."
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: query_id
        data_type: varchar
        description: "쿼리 지문 해시."
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: dow
        data_type: smallint
        description: "요일(UTC, 일=0..토=6)."
        constraints:
          - type: not_null
      - name: hour
        data_type: smallint
        description: "시간대(0-23, UTC)."
        constraints:
          - type: not_null
      - name: mean_delta_calls
        data_type: double
        description: "그 (dow,hour) 버킷의 시간당 호출량 평균."
      - name: stddev_delta_calls
        data_type: double
        description: "표본 표준편차. 관측 1개면 NULL(분산 정보 없음)."
      - name: observations
        data_type: bigint
        description: "버킷 관측 수(min_observations 게이트 통과분만)."
      - name: computed_at
        data_type: timestamp with time zone
        description: "이 베이스라인 계산 시각."

  # --- Phase 13 — 크기 팩트·용량 예측 ---
  - name: fct_size_daily
    description: >
      일별 오브젝트 크기 팩트(Phase 13). 크기는 절대값이라 하루 대푯값 = 그날 마지막
      관측(6시간 주기 중 최신). 증분 delete+insert·워터마크 리터럴(검증된 패턴).
    columns:
      - name: instance_id
        tests: [not_null]
      - name: object_name
        tests: [not_null]
      - name: dt
        tests: [not_null]
      - name: total_bytes
        description: "data_bytes + index_bytes."
  - name: mart_capacity_forecast
    description: >
      용량 예측 마트(Phase 13) — 최근 N일(기본 30) 선형 추세(regr_slope)로 임계까지
      잔여일 판정 컬럼을 계산한다. 발화는 안 한다(소비 = Metabase pull / DBTower
      reverse ETL push). 임계는 seeds/capacity_thresholds(원천 ①) — kind가 의미를
      정한다(physical/autoscale_max/budget/none). 관측 14일 미만은 learning(지어내지
      않음). 단기(시간~일) 디스크 ETA는 DBTower 78절의 몫 — 지평 경계.
    columns:
      - name: instance_id
        tests: [not_null]
      - name: risk_flag
        description: "learning | stable_or_shrinking | growth_only | d30 | d90 | ok."

  # --- 마무리 아크 — 보조 원천 소비층(14단계 소비) ---
  - name: fct_wait_event_daily
    description: >
      일별 대기 이벤트 팩트. 기종별 의미 차이(누적/스냅샷/큐 — CONTRACT §1-1)를 뭉개지
      않으려 delta_*(누적 기종의 발생량)와 last_*(그날 마지막 상태)를 함께 싣는다.
    columns:
      - {name: instance_id, tests: [not_null]}
      - {name: event_name, tests: [not_null]}
      - {name: dt, tests: [not_null]}
  - name: fct_backup_daily
    description: "일별 백업 이력 팩트(D+1 재추출이 사후 verify 반영) — 분기 실패율 추세의 재료."
    columns:
      - {name: instance_id, tests: [not_null]}
      - {name: dt, tests: [not_null]}
  - name: fct_plan_change_daily
    description: "일별 플랜 변경 팩트 — 월간 플립 추세의 재료."
    columns:
      - {name: instance_id, tests: [not_null]}
      - {name: dt, tests: [not_null]}
  - name: mart_wait_top
    description: >
      최근 30일 인스턴스별 상위 대기(delta_ms 기준 + sum_last_ms 병기 — 스냅샷 기종 정직
      구분). "요즘 이 DB는 주로 뭘 기다리나"의 답.
    columns:
      - {name: instance_id, tests: [not_null]}
      - {name: event_name, tests: [not_null]}

  # --- 16단계 — 판정의 마지막 마일(플랜 회귀·백업 공백·주간 보고) ---
  # 앞 둘은 DBTower MCP(lakehouse_query, G7)가 소비하는 스키마라 계약을 건다 — 도구 설명에
  # 박힌 컬럼과 어긋나면 빌드에서 막혀야 한다. 주간 보고는 서빙 편의 마트라 테스트만(과계약 지양).
  - name: mart_plan_regression
    description: >
      플랜 뒤집힘 전후 지연 비교로 회귀를 판정(16단계 G1~G3). 일 단위 대표 플랜의 lag로
      뒤집힘을 잡고, fct_query_daily 지연을 전 N일 vs 후 N일 비교해 verdict를 낸다.
      verdict: REGRESSED/IMPROVED/NEUTRAL/PENDING(관측 미도래)/AMBIGUOUS(비교창 오염).
      발화는 안 한다(소비 = Metabase pull / DBTower push). 볼륨 성장 회귀는 이 마트가
      아니라 mart_query_regression의 관심사 — 원인 축이 다르다.
    config:
      contract:
        enforced: true
    columns:
      - name: instance_id
        data_type: bigint
        constraints: [{type: not_null}]
        tests: [not_null]
      - name: query_id
        data_type: varchar
        constraints: [{type: not_null}]
        tests: [not_null]
      - name: flip_dt
        data_type: date
        description: "대표 플랜이 직전과 달라진 첫 dt(뒤집힘일)."
        constraints: [{type: not_null}]
      - name: prev_plan_hash
        data_type: varchar
        description: "뒤집히기 전 대표 플랜 해시."
      - name: new_plan_hash
        data_type: varchar
        description: "뒤집힌 뒤 대표 플랜 해시."
      - name: before_avg_ms
        data_type: double
        description: "뒤집힘 전 N일 평균 지연(NULL 제외 평균). 관측 없으면 NULL."
      - name: after_avg_ms
        data_type: double
        description: "뒤집힘 후 N일 평균 지연. 뒤집힘 당일은 전/후 섞여 양쪽 제외."
      - name: latency_ratio
        data_type: double
        description: "after/before 비율(소수 2자리 고정 — 판정 재현성). >=임계면 REGRESSED."
      - name: before_days
        data_type: bigint
        description: "전 창에서 지연이 관측된 dt 수."
      - name: after_days
        data_type: bigint
        description: "후 창에서 지연이 관측된 dt 수. 0이면 PENDING."
      - name: after_calls
        data_type: hugeint
        description: "후 창 호출수 합. 임계 미만이면 저호출 노이즈로 NEUTRAL."
      - name: verdict
        data_type: varchar
        description: "REGRESSED | IMPROVED | NEUTRAL | PENDING | AMBIGUOUS."
        constraints: [{type: not_null}]
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["REGRESSED", "IMPROVED", "NEUTRAL", "PENDING", "AMBIGUOUS"]
      - name: computed_at
        data_type: timestamp with time zone

  - name: mart_backup_rpo
    description: >
      인스턴스별 백업 공백(RPO) 판정(16단계 G4). 유니버스=fct_query_daily distinct instance(전
      기종 공통), 기준일=창고 max dt(벽시계 아님). last_success_dt 이후 경과일이 임계 초과면
      breach, 성공 백업 관측이 아예 없으면 no_backup_observed(기종 미수집 가능성 포함 — 창고엔
      기종 축이 없어 단정 안 함). 발화는 안 한다.
    config:
      contract:
        enforced: true
    columns:
      - name: instance_id
        data_type: bigint
        constraints: [{type: not_null}]
        tests: [not_null]
      - name: as_of_dt
        data_type: date
        description: "판정 기준일 = 창고 최신 dt."
        constraints: [{type: not_null}]
      - name: last_success_dt
        data_type: date
        description: "마지막 성공 백업 dt. 없으면 NULL."
      - name: last_verified_dt
        data_type: date
        description: "마지막 검증(VERIFIED) 백업 dt."
      - name: gap_days
        data_type: bigint
        description: "as_of_dt - last_success_dt(일). 성공 백업 없으면 NULL."
      - name: no_successful_backup
        data_type: boolean
        description: "성공 백업 관측이 하나도 없으면 true."
        constraints: [{type: not_null}]
      - name: max_gap_days
        data_type: bigint
        description: "적용된 허용 한계(seed override 없으면 var 기본)."
      - name: rpo_status
        data_type: varchar
        description: "ok | breach | no_backup_observed."
        constraints: [{type: not_null}]
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ok", "breach", "no_backup_observed"]
      - name: computed_at
        data_type: timestamp with time zone

  - name: mart_weekly_ops_report
    description: >
      주간 운영 보고(16단계 G5) — 인스턴스당 한 행에 용량 D-day·top 대기·플랜 뒤집힘·백업
      공백을 접는다. 용량/대기/백업은 현재 스냅샷, 플랜 뒤집힘은 이번 주 집계. 이력 한 주 미만은
      is_partial_week=true. 서빙 편의 마트(계약 미부여, 테스트만).
    columns:
      - {name: week_start, tests: [not_null]}
      - {name: instance_id, tests: [not_null]}

  - name: fct_index_daily
    description: >
      일별 인덱스 사용 팩트(17단계). scan_count 누적을 first-vs-last로 접어 하루 실사용
      (delta_scans)을 낸다 — query_snapshot과 같은 심장, 리셋은 GREATEST(0,..) 클램프.
      증분 delete+insert·워터마크 리터럴(검증된 패턴). is_unique·size_bytes는 판정용.
    columns:
      - name: instance_id
        tests: [not_null]
      - name: index_name
        tests: [not_null]
      - name: dt
        tests: [not_null]
      - name: delta_scans
        tests: [not_null]

  - name: mart_index_verdict
    description: >
      미사용 인덱스 장기 판정(17단계) — fct_index_daily의 일간 실사용을 창(기본 90일)으로
      합산해 "지워도 되나"를 답한다. 판정 예외: 유니크/PK 뒷받침 제외, 관측 하한 미만 보류,
      FK 뒷받침·레플리카 전용 사용은 이 통계로 판정 불가(note 정직 표기). 삭제 지시 아니라 조언.
    columns:
      - name: instance_id
        tests: [not_null]
      - name: index_name
        tests: [not_null]
      - name: verdict
        tests:
          - not_null
          - accepted_values:
              values: ["in_use", "constraint_backed", "insufficient_observation", "candidate_unused"]
