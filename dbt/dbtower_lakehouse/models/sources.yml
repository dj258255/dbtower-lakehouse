# raw 레이어 소스 선언(Phase 1 산출물). 모델 구현은 Phase 2(이 편).
# dbt-duckdb는 external_location을 read_parquet 식으로 확장해 source()를 MinIO에 직결한다.
# httpfs/parquet 확장과 s3 설정은 profiles.yml에서 로드된다.
#
# external_location은 RAW_SNAPSHOT_LOCATION 환경변수로 덮어쓸 수 있다(기본값=운영 MinIO).
# CI(Phase 9)는 MinIO가 없으므로 이 변수를 로컬 픽스처 parquet의 read_parquet(...)로
# 지정해 dbt build를 외부 DW 없이 e2e로 돌린다(scripts/ci_fixture.py). 운영 경로는 불변.
version: 2

sources:
  - name: raw
    description: "Airflow snapshot_offload DAG가 MinIO에 적재한 원본 스냅샷(파티션 parquet)."
    meta:
      external_location: >-
        {{ env_var('RAW_SNAPSHOT_LOCATION',
           "read_parquet('s3://lakehouse/raw/query_snapshot/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
    tables:
      - name: query_snapshot
        description: >
          DBTower 메타 PG query_snapshot의 하루치 스냅샷. calls/total_time_ms는
          서버 기동 이후 누적 카운터(코드·실측 확인) — 일간 델타는 이 편(Phase 2)에서 계산한다.
        # data_type을 명시하면 dbt unit test가 외부 소스(read_parquet)를 물리적으로
        # 존재시키지 않고도 입력을 목킹할 수 있다(Phase 9 — CI에 MinIO 불필요).
        # dt는 Hive 파티션 값이라 VARCHAR로 읽힌다(staging에서 date로 캐스팅).
        columns:
          - name: id
            data_type: bigint
            description: "원천 PK(감사·중복 추적용). 스냅샷마다 새로 발번되어 계열 식별자는 아님."
          - name: instance_id
            data_type: bigint
            description: "database_instance FK. 파티션 키."
          - name: captured_at
            data_type: timestamp
            description: "수집 시각(UTC). 같은 값이 한 배치."
          - name: query_id
            data_type: varchar
            description: "쿼리 지문 해시(최대 64자). 원천에서 지문 충돌이 관측됨(같은 지문에 복수 누적 계열)."
          - name: query_text
            data_type: varchar
            description: "정규화된 쿼리문(nullable)."
          - name: calls
            data_type: bigint
            description: "누적 호출수(구간값 아님)."
          - name: total_time_ms
            data_type: double
            description: "누적 총 실행시간 ms(구간값 아님)."
          - name: rows_examined
            data_type: bigint
            description: "누적 검사 행수."
          - name: dt
            data_type: varchar
            description: "Hive 파티션 논리 날짜(UTC). 파일 경로 dt=YYYY-MM-DD에서 VARCHAR로 읽힘."
      - name: size_snapshot
        description: >
          오브젝트 크기 시계열(13단계 원료). DBTower SizeSnapshotJob이 6시간 주기로 영속한
          tableStats — offload가 raw/size_snapshot/ 파티션으로 내린다. volume_*·max_bytes는
          임계 원천 ②(기종이 아는 볼륨)로 현재 NULL(후속 공급, 계약 nullable).
        meta:
          external_location: >-
            {{ env_var('RAW_SIZE_SNAPSHOT_LOCATION',
               "read_parquet('s3://lakehouse/raw/size_snapshot/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
        columns:
          - name: id
            data_type: bigint
          - name: instance_id
            data_type: bigint
          - name: captured_at
            data_type: timestamp
          - name: object_type
            data_type: varchar
          - name: object_name
            data_type: varchar
          - name: row_estimate
            data_type: bigint
          - name: data_bytes
            data_type: bigint
          - name: index_bytes
            data_type: bigint
          - name: volume_total_bytes
            data_type: bigint
          - name: volume_available_bytes
            data_type: bigint
          - name: max_bytes
            data_type: bigint
          - name: dt
            data_type: varchar
      - name: wait_event_snapshot
        description: >
          대기 이벤트 5분 주기 영속(D1). 기종별 의미 차이(MySQL/MSSQL/Oracle=누적,
          PG=현재 스냅샷, Mongo=대기 큐)는 CONTRACT §1-1 — fct가 델타와 라스트를 함께 실어
          소비자가 기종에 맞게 고른다.
        meta:
          external_location: >-
            {{ env_var('RAW_WAIT_EVENT_LOCATION',
               "read_parquet('s3://lakehouse/raw/wait_event_snapshot/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
        columns:
          - {name: id, data_type: bigint}
          - {name: instance_id, data_type: bigint}
          - {name: captured_at, data_type: timestamp}
          - {name: event_name, data_type: varchar}
          - {name: category, data_type: varchar}
          - {name: wait_count, data_type: bigint}
          - {name: total_ms, data_type: double}
          - {name: dt, data_type: varchar}
      - name: backup_run
        description: "백업 이력(D+1 스냅샷 계약 — 사후 변이는 다음날 재추출이 반영)."
        meta:
          external_location: >-
            {{ env_var('RAW_BACKUP_RUN_LOCATION',
               "read_parquet('s3://lakehouse/raw/backup_run/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
        columns:
          - {name: id, data_type: bigint}
          - {name: instance_id, data_type: bigint}
          - {name: started_at, data_type: timestamp}
          - {name: status, data_type: varchar}
          - {name: backup_type, data_type: varchar}
          - {name: duration_ms, data_type: bigint}
          - {name: detail, data_type: varchar}
          - {name: location, data_type: varchar}
          - {name: verify_status, data_type: varchar}
          - {name: verified_at, data_type: timestamp}
          - {name: remote_location, data_type: varchar}
          - {name: dt, data_type: varchar}
      - name: plan_snapshot
        description: "플랜 변경 이력(D2 48h 보존 하한으로 하루창 유실 차단)."
        meta:
          external_location: >-
            {{ env_var('RAW_PLAN_SNAPSHOT_LOCATION',
               "read_parquet('s3://lakehouse/raw/plan_snapshot/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
        columns:
          - {name: id, data_type: bigint}
          - {name: instance_id, data_type: bigint}
          - {name: query_id, data_type: varchar}
          - {name: plan_hash, data_type: varchar}
          - {name: plan_shape, data_type: varchar}
          - {name: captured_at, data_type: timestamp}
          - {name: dt, data_type: varchar}
      - name: index_usage_snapshot
        description: >
          인덱스 사용 통계 6시간 주기 영속(17단계, DBTower V29). scan_count는 통계 리셋
          이후 누적(query_snapshot과 같은 성질) — 일간 실사용은 fct에서 first-vs-last 델타로
          복원한다. is_unique는 판정 예외(유니크/PK 뒷받침은 미사용이라도 삭제 불가). Oracle은
          원천 UNSUPPORTED라 행이 없다.
        meta:
          external_location: >-
            {{ env_var('RAW_INDEX_USAGE_LOCATION',
               "read_parquet('s3://lakehouse/raw/index_usage_snapshot/dt=*/instance_id=*/*.parquet', hive_partitioning = 1)") }}
        columns:
          - {name: id, data_type: bigint}
          - {name: instance_id, data_type: bigint}
          - {name: captured_at, data_type: timestamp}
          - {name: table_name, data_type: varchar}
          - {name: index_name, data_type: varchar}
          - {name: scan_count, data_type: bigint}
          - {name: size_bytes, data_type: bigint}
          - {name: is_unique, data_type: boolean}
          - {name: dt, data_type: varchar}
