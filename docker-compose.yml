# Airflow (LocalExecutor) — 경량 스캐폴드.
#
# 선택(docs/ROADMAP.md Phase 0):
# - CeleryExecutor(공식 compose 기본)는 Redis+워커로 무겁다 → LocalExecutor.
#   LocalExecutor는 스케줄러 프로세스 안에서 태스크를 병렬 실행하므로
#   Redis·별도 워커가 필요 없다(단일 노드·일 배치 규모에 충분).
# - Airflow 메타DB는 전용 postgres 하나(airflow-postgres)로 격리한다.
#   DBTower 메타 PG(원천)와 물리 분리 — 관제 DB를 오염시키지 않는다.
# - 원천(dbtower-postgres)·싱크(dbtower-minio)는 dbtower_default 네트워크에
#   external로 붙어 재사용한다(중복 스택 금지).
#
# 사용: cp .env.example .env  &&  docker compose up -d
# UI: http://localhost:8080 (airflow / airflow)

x-airflow-common: &airflow-common
  # Phase 6: 커스텀 이미지(Dockerfile) — 추출 의존성 + 분리 venv의 dbt를 굽는다.
  # _PIP_ADDITIONAL_REQUIREMENTS(기동 때마다 pip)는 비재현적이라 폐기했다.
  build: .
  image: lakehouse-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # backfill 폭주 방지 — 병렬·활성 런 상한(Phase 1 함정 방어).
    AIRFLOW__CORE__PARALLELISM: "4"
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
    # extract 패키지가 원천/싱크를 컨테이너 호스트명으로 찾도록 덮어쓴다.
    SRC_PG_HOST: dbtower-postgres
    SRC_PG_PORT: "5432"
    SRC_PG_DB: dbtower
    SRC_PG_USER: postgres
    SRC_PG_PASSWORD: dbtower1234
    S3_ENDPOINT: http://dbtower-minio:9000
    S3_ACCESS_KEY: dbtower
    S3_SECRET_KEY: dbtower1234
    S3_BUCKET: lakehouse
    # dbt(컨테이너 안 transform)의 duckdb httpfs가 쓰는 호스트:포트 — 컨테이너 관점.
    S3_ENDPOINT_HOSTPORT: dbtower-minio:9000
    # 실패 알림 webhook(Phase 6). 비우면 알림 없이 돈다(no-op). .env로 주입.
    ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    # DuckLake 유지보수 보존 기간 — 이보다 오래된 스냅샷·파일은 주간 CHECKPOINT가 정리.
    DUCKLAKE_RETENTION: ${DUCKLAKE_RETENTION:-7 days}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./extract:/opt/airflow/extract
    - ./logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    container_name: lakehouse-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: lakehouse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow --password airflow \
          --firstname a --lastname b --role Admin --email a@b.c || true
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: lakehouse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # Phase 7: 대시보드(BI). 마트가 있어도 소비자가 없으면 파이프라인은 미완성이다.
  #
  # 연결 대상은 dbt의 DuckDB "파일"이 아니라 DuckLake(카탈로그=PG, 데이터=S3)다.
  # DuckDB 파일은 프로세스 간 단일 쓰기다 — 같은 호스트에선 BI가 물고 있으면 새벽
  # transform(dbt)이 잠금 충돌로 죽고, 컨테이너 경계(virtiofs)에선 그 잠금마저 전파되지
  # 않아 쓰기 도중 읽기가 무방비가 된다(둘 다 실측 — docs/VERIFICATION.md 8절).
  # DuckLake는 카탈로그가 PG 트랜잭션이라 읽기(대시보드)/쓰기(publish)가 서로 안 막는다.
  #
  # DuckDB 커넥터는 MotherDuck이 유지하는 커뮤니티 드라이버. 공식 Metabase 이미지는
  # Alpine(musl)이라 드라이버의 네이티브 라이브러리가 안 뜬다(실측 UnsatisfiedLinkError)
  # — Debian 기반 커스텀 이미지(metabase/Dockerfile)에 드라이버를 구워 쓴다.
  # 앱 DB는 기본 H2를 볼륨에 영속(로컬 데모 규모 — 운영이면 PG로 뺀다).
  # 초기 설정·연결·대시보드 재현: scripts/metabase_bootstrap.py (docs/RUNBOOK.md 5절).
  metabase:
    build: ./metabase
    image: lakehouse-metabase:latest
    container_name: lakehouse-metabase
    ports:
      - "13001:3000"   # 13000은 dbtower-grafana가 사용 중
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: UTC
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  airflow-db:
  metabase-data:

# dbtower 데모 스택 네트워크를 재사용해 원천 PG·MinIO에 붙는다.
networks:
  default:
    name: dbtower_default
    external: true
