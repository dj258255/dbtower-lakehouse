<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .bg   { fill:#ffffff; }
    .card { fill:#f8fafc; stroke:#cbd5e1; }
    .lake { fill:#faf5ff; stroke:#c4b5fd; stroke-width:1.5; stroke-dasharray:6 5; }
    .minio{ fill:#eef2ff; stroke:#c7d2fe; }
    .marts{ fill:#ecfdf5; stroke:#a7f3d0; }
    .sink { fill:#ecfeff; stroke:#a5f3fc; }
    .gate { fill:#fffbeb; stroke:#fcd34d; }
    .title { fill:#0f172a; font-weight:700; }
    .mid   { fill:#1e293b; font-weight:600; }
    .sub   { fill:#475569; }
    .cap   { fill:#64748b; font-weight:600; letter-spacing:.4px; }
    .lakename { fill:#7c3aed; font-weight:700; }
    .label { fill:#334155; }
    .mono  { fill:#334155; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .a-flow{ stroke:#6366f1; fill:none; stroke-width:2; }
    .h-flow{ fill:#6366f1; }
    .a-gate{ stroke:#d97706; fill:none; stroke-width:2; stroke-dasharray:5 4; }
    .h-gate{ fill:#d97706; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill:#0b1220; }
      .card { fill:#111827; stroke:#334155; }
      .lake { fill:#1a132e; stroke:#6d28d9; }
      .minio{ fill:#1e1b4b; stroke:#3730a3; }
      .marts{ fill:#052e2b; stroke:#134e4a; }
      .sink { fill:#083344; stroke:#155e75; }
      .gate { fill:#3b2f0b; stroke:#a16207; }
      .title { fill:#e2e8f0; }
      .mid   { fill:#cbd5e1; }
      .sub   { fill:#94a3b8; }
      .cap   { fill:#94a3b8; }
      .lakename { fill:#c4b5fd; }
      .label { fill:#cbd5e1; }
      .mono  { fill:#cbd5e1; }
      .a-flow{ stroke:#818cf8; }
      .h-flow{ fill:#818cf8; }
      .a-gate{ stroke:#fbbf24; }
      .h-gate{ fill:#fbbf24; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="1500" height="950" rx="14"/>

  <!-- ===== 원천/카탈로그 PG (외부 재사용 컨테이너) ===== -->
  <rect class="minio" x="30" y="80" width="300" height="300" rx="10"/>
  <text class="title" x="180" y="106" font-size="14" text-anchor="middle">dbtower-postgres</text>
  <text class="cap"   x="180" y="126" font-size="10.5" text-anchor="middle">외부 재사용(관제 스택) · 15432 → 5432</text>

  <rect class="card" x="50" y="142" width="260" height="100" rx="8"/>
  <text class="mid" x="180" y="166" font-size="12.5" text-anchor="middle">DB dbtower (관측 메타)</text>
  <text class="sub" x="180" y="188" font-size="11" text-anchor="middle">query_snapshot — 7일 보존 스냅샷</text>
  <text class="sub" x="180" y="208" font-size="11" text-anchor="middle">database_instance — 레지스트리</text>

  <rect class="card" x="50" y="256" width="260" height="106" rx="8"/>
  <text class="mid" x="180" y="280" font-size="12.5" text-anchor="middle">DB ducklake_catalog (분리)</text>
  <text class="sub" x="180" y="302" font-size="11" text-anchor="middle">DuckLake 카탈로그 테이블</text>
  <text class="sub" x="180" y="322" font-size="11" text-anchor="middle">pipeline_heartbeat — 생존 신호</text>

  <!-- ===== Airflow 런타임 컨테이너 ===== -->
  <rect class="card" x="380" y="80" width="640" height="130" rx="10"/>
  <text class="title" x="700" y="106" font-size="13.5" text-anchor="middle">Airflow · LocalExecutor (이미지 lakehouse-airflow)</text>

  <rect class="card" x="400" y="122" width="190" height="66" rx="8"/>
  <text class="mid" x="495" y="146" font-size="12" text-anchor="middle">airflow-webserver</text>
  <text class="sub" x="495" y="166" font-size="10.5" text-anchor="middle">:8080 (UI)</text>

  <rect class="card" x="610" y="122" width="190" height="66" rx="8"/>
  <text class="mid" x="705" y="146" font-size="12" text-anchor="middle">airflow-scheduler</text>
  <text class="sub" x="705" y="166" font-size="10.5" text-anchor="middle">태스크 실행 · 병렬 4</text>

  <rect class="card" x="820" y="122" width="180" height="66" rx="8"/>
  <text class="mid" x="910" y="146" font-size="12" text-anchor="middle">airflow-postgres</text>
  <text class="sub" x="910" y="166" font-size="10.5" text-anchor="middle">전용 메타 DB(격리)</text>

  <!-- ===== 웹훅(외부) ===== -->
  <rect class="gate" x="1180" y="80" width="290" height="110" rx="10"/>
  <text class="title" x="1325" y="108" font-size="13.5" text-anchor="middle">웹훅 알림</text>
  <text class="sub" x="1325" y="132" font-size="10.5" text-anchor="middle">ALERT_WEBHOOK_URL (외부 채널)</text>
  <text class="sub" x="1325" y="152" font-size="10.5" text-anchor="middle">on_failure_callback — JSON POST</text>

  <!-- ===== deadman_watch DAG ===== -->
  <rect class="gate" x="1180" y="300" width="290" height="120" rx="10"/>
  <text class="title" x="1325" y="328" font-size="12.5" text-anchor="middle">DAG deadman_watch · @hourly</text>
  <text class="sub" x="1325" y="350" font-size="10.5" text-anchor="middle">pipeline_heartbeat 신선도 검문</text>
  <text class="sub" x="1325" y="370" font-size="10.5" text-anchor="middle">기한(26h) 초과 → 웹훅 경보</text>
  <text class="sub" x="1325" y="390" font-size="10" text-anchor="middle">스케줄러 death는 외부 cron 몫(한계 명시)</text>

  <path class="a-gate" d="M1325 300 L1325 198"/>
  <polygon class="h-gate" points="1325,190 1320,200 1330,200"/>
  <text class="label" x="1337" y="250" font-size="10.5">경보</text>

  <!-- ===== DAG snapshot_offload 태스크 체인 ===== -->
  <rect class="lake" x="360" y="290" width="700" height="150" rx="12"/>
  <text class="lakename" x="376" y="312" font-size="12.5">DAG snapshot_offload · @daily</text>

  <rect class="card" x="376" y="326" width="120" height="70" rx="8"/>
  <text class="mid" x="436" y="348" font-size="12" text-anchor="middle">offload</text>
  <text class="sub" x="436" y="364" font-size="10" text-anchor="middle">PG → parquet</text>
  <text class="sub" x="436" y="380" font-size="10" text-anchor="middle">재시도 3 · 백오프</text>

  <rect class="gate" x="513" y="326" width="120" height="70" rx="8"/>
  <text class="mid" x="573" y="348" font-size="12" text-anchor="middle">quality_gate</text>
  <text class="sub" x="573" y="364" font-size="10" text-anchor="middle">4축 fail-closed</text>
  <text class="sub" x="573" y="380" font-size="10" text-anchor="middle">FAIL 차단 · retry 0</text>

  <rect class="card" x="650" y="326" width="120" height="70" rx="8"/>
  <text class="mid" x="710" y="348" font-size="12" text-anchor="middle">transform</text>
  <text class="sub" x="710" y="364" font-size="10" text-anchor="middle">dbt run + test</text>
  <text class="sub" x="710" y="380" font-size="10" text-anchor="middle">분리 venv의 dbt</text>

  <rect class="card" x="787" y="326" width="120" height="70" rx="8"/>
  <text class="mid" x="847" y="348" font-size="12" text-anchor="middle">publish</text>
  <text class="sub" x="847" y="364" font-size="10" text-anchor="middle">마트 → DuckLake</text>
  <text class="sub" x="847" y="380" font-size="10" text-anchor="middle">단일 트랜잭션</text>

  <rect class="card" x="924" y="326" width="120" height="70" rx="8"/>
  <text class="mid" x="984" y="348" font-size="12" text-anchor="middle">heartbeat</text>
  <text class="sub" x="984" y="364" font-size="10" text-anchor="middle">성공 신호 기록</text>
  <text class="sub" x="984" y="380" font-size="10" text-anchor="middle">런 메타 발행</text>

  <!-- 태스크 순서 화살표 -->
  <path class="a-flow" d="M496 361 L505 361"/>
  <polygon class="h-flow" points="513,361 503,356 503,366"/>
  <path class="a-flow" d="M633 361 L642 361"/>
  <polygon class="h-flow" points="650,361 640,356 640,366"/>
  <path class="a-flow" d="M770 361 L779 361"/>
  <polygon class="h-flow" points="787,361 777,356 777,366"/>
  <path class="a-flow" d="M907 361 L916 361"/>
  <polygon class="h-flow" points="924,361 914,356 914,366"/>

  <!-- 원천 → offload -->
  <path class="a-flow" d="M330 360 L368 360"/>
  <polygon class="h-flow" points="376,360 366,355 366,365"/>
  <text class="label" x="345" y="349" font-size="10" text-anchor="middle">추출</text>

  <!-- FAIL/최종 실패 → 웹훅 (분기) -->
  <path class="a-gate" d="M573 326 L573 225 L1240 225 L1240 198"/>
  <polygon class="h-gate" points="1240,190 1235,200 1245,200"/>
  <text class="label" x="906" y="217" font-size="10.5" text-anchor="middle">품질 FAIL · 태스크 최종 실패 → 통보</text>

  <!-- heartbeat → 카탈로그 PG (성공 신호) -->
  <path class="a-flow" d="M984 326 L984 235 L342 235"/>
  <polygon class="h-flow" points="334,235 344,230 344,240"/>
  <text class="label" x="660" y="251" font-size="10.5" text-anchor="middle">성공 시 pipeline_heartbeat 기록(upsert)</text>

  <!-- 카탈로그 PG → deadman (역방향 감시) -->
  <path class="a-gate" d="M330 262 L1140 262 L1140 340 L1172 340"/>
  <polygon class="h-gate" points="1180,340 1170,335 1170,345"/>
  <text class="label" x="660" y="277" font-size="10.5" text-anchor="middle">deadman이 신선도를 역방향 감시</text>

  <!-- ===== DAG행 ↔ 스토리지행 수직 흐름 ===== -->
  <path class="a-flow" d="M436 396 L436 462"/>
  <polygon class="h-flow" points="436,470 431,460 441,460"/>
  <text class="label" x="448" y="435" font-size="10.5">parquet(zstd) 적재</text>

  <path class="a-flow" d="M710 470 L710 404"/>
  <polygon class="h-flow" points="710,396 705,406 715,406"/>
  <text class="label" x="722" y="435" font-size="10.5">read_parquet 직독</text>

  <path class="a-flow" d="M847 396 L847 462"/>
  <polygon class="h-flow" points="847,470 842,460 852,460"/>
  <text class="label" x="859" y="435" font-size="10.5">마트 발행</text>

  <path class="a-flow" d="M984 396 L984 462"/>
  <polygon class="h-flow" points="984,470 979,460 989,460"/>
  <text class="label" x="996" y="435" font-size="10.5">pipeline_run_log</text>

  <!-- ===== MinIO (외부 재사용 컨테이너) ===== -->
  <rect class="minio" x="360" y="470" width="430" height="190" rx="10"/>
  <text class="title" x="575" y="496" font-size="13.5" text-anchor="middle">dbtower-minio (S3 호환)</text>
  <text class="cap" x="575" y="514" font-size="10" text-anchor="middle">외부 재사용 · 19000 → 9000 · 버킷 lakehouse</text>
  <text class="mono" x="384" y="542" font-size="11">raw/query_snapshot/</text>
  <text class="mono" x="384" y="560" font-size="11">&#160;&#160;dt=YYYY-MM-DD/instance_id=N/</text>
  <text class="mono" x="384" y="578" font-size="11">&#160;&#160;&#160;&#160;part-000.parquet (zstd)</text>
  <text class="mono" x="384" y="604" font-size="11">ducklake/ — DuckLake 데이터 파일</text>
  <text class="sub" x="575" y="636" font-size="10.5" text-anchor="middle">파티션 통째 덮어쓰기(멱등) · Hive 파티셔닝</text>

  <!-- ===== DuckLake (논리 계층: 카탈로그 PG + 데이터 S3) ===== -->
  <rect class="lake" x="840" y="470" width="340" height="190" rx="12"/>
  <text class="lakename" x="1010" y="496" font-size="13.5" text-anchor="middle">DuckLake (테이블 포맷)</text>
  <text class="sub" x="1010" y="518" font-size="10.5" text-anchor="middle">카탈로그 = dbtower-postgres · ducklake_catalog</text>
  <text class="sub" x="1010" y="536" font-size="10.5" text-anchor="middle">데이터 = s3://lakehouse/ducklake/ (MinIO)</text>
  <text class="mid" x="1010" y="564" font-size="11.5" text-anchor="middle">fct_query_daily · mart_query_regression</text>
  <text class="mid" x="1010" y="582" font-size="11.5" text-anchor="middle">pipeline_run_log</text>
  <text class="sub" x="1010" y="610" font-size="10.5" text-anchor="middle">ACID · 타임트래블 · 읽기/쓰기 상호 비차단</text>
  <text class="sub" x="1010" y="630" font-size="10.5" text-anchor="middle">스냅샷 보존 7일(주간 CHECKPOINT)</text>

  <!-- ===== ducklake_maintenance DAG ===== -->
  <rect class="gate" x="360" y="720" width="390" height="140" rx="10"/>
  <text class="title" x="555" y="748" font-size="12.5" text-anchor="middle">DAG ducklake_maintenance · @weekly</text>
  <text class="sub" x="555" y="772" font-size="10.5" text-anchor="middle">CHECKPOINT — 스냅샷 만료 + 파일 컴팩션</text>
  <text class="sub" x="555" y="792" font-size="10.5" text-anchor="middle">보존 DUCKLAKE_RETENTION(기본 7일)</text>
  <text class="sub" x="555" y="812" font-size="10.5" text-anchor="middle">행수 불변식 검사 · 실패 시 웹훅</text>

  <path class="a-gate" d="M555 720 L555 690 L890 690 L890 666"/>
  <polygon class="h-gate" points="890,660 885,670 895,670"/>
  <text class="label" x="600" y="683" font-size="10.5">CHECKPOINT</text>

  <!-- ===== Metabase ===== -->
  <rect class="sink" x="840" y="720" width="340" height="170" rx="10"/>
  <text class="title" x="1010" y="748" font-size="13.5" text-anchor="middle">lakehouse-metabase</text>
  <text class="cap" x="1010" y="766" font-size="10" text-anchor="middle">13001 → 3000 · 커스텀 Debian 이미지</text>
  <text class="sub" x="1010" y="790" font-size="10.5" text-anchor="middle">MotherDuck DuckDB 드라이버 내장</text>
  <text class="sub" x="1010" y="810" font-size="10.5" text-anchor="middle">앱 DB: H2(볼륨 metabase-data)</text>
  <text class="mid" x="1010" y="838" font-size="11.5" text-anchor="middle">DuckLake만 read-only로 읽는다</text>
  <text class="sub" x="1010" y="858" font-size="10.5" text-anchor="middle">악화 쿼리 랭킹 · 운영 대시보드</text>

  <path class="a-flow" d="M1010 660 L1010 712"/>
  <polygon class="h-flow" points="1010,720 1005,710 1015,710"/>
  <text class="label" x="1022" y="692" font-size="10.5">read-only 질의</text>

  <!-- ===== 범례 ===== -->
  <rect class="card" x="40" y="902" width="14" height="14" rx="3"/>
  <text class="sub" x="62" y="913" font-size="10.5">lakehouse compose 컨테이너 · 태스크</text>
  <rect class="minio" x="320" y="902" width="14" height="14" rx="3"/>
  <text class="sub" x="342" y="913" font-size="10.5">외부 재사용(dbtower 관제 스택 · dbtower_default)</text>
  <rect class="lake" x="660" y="902" width="14" height="14" rx="3"/>
  <text class="sub" x="682" y="913" font-size="10.5">DAG · DuckLake 논리 계층</text>
  <rect class="gate" x="880" y="902" width="14" height="14" rx="3"/>
  <text class="sub" x="902" y="913" font-size="10.5">품질 · 감시 · 알림</text>
  <rect class="sink" x="1040" y="902" width="14" height="14" rx="3"/>
  <text class="sub" x="1062" y="913" font-size="10.5">BI 소비</text>
</svg>
