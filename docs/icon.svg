<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DBLake">
  <defs>
    <clipPath id="hexclip">
      <polygon points="0,-136 118,-68 118,68 0,136 -118,68 -118,-68"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="116" fill="#0b1220"/>
  <g transform="translate(256,256)">
    <!-- data layers clipped inside hex -->
    <g clip-path="url(#hexclip)">
      <rect x="-118" y="18" width="236" height="120" fill="#0891b2"/>
      <rect x="-118" y="-26" width="236" height="42" fill="#22d3ee"/>
      <rect x="-118" y="-70" width="236" height="42" fill="#67e8f9"/>
    </g>
    <!-- hexagon frame -->
    <polygon points="0,-136 118,-68 118,68 0,136 -118,68 -118,-68"
             fill="none" stroke="#22d3ee" stroke-width="26" stroke-linejoin="round"/>
    <!-- shared status dot (link to DBTower) -->
    <circle cx="0" cy="-160" r="20" fill="#34d399"/>
  </g>
</svg>
