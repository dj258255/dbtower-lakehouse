<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 890" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .bg   { fill:#ffffff; }
    .card { fill:#f8fafc; stroke:#cbd5e1; }
    .lake { fill:#faf5ff; stroke:#c4b5fd; stroke-width:1.5; stroke-dasharray:6 5; }
    .minio{ fill:#eef2ff; stroke:#c7d2fe; }
    .marts{ fill:#ecfdf5; stroke:#a7f3d0; }
    .gate { fill:#fffbeb; stroke:#fcd34d; }
    .hline{ stroke:#cbd5e1; stroke-width:1; }
    .title { fill:#0f172a; font-weight:700; }
    .mid   { fill:#1e293b; font-weight:600; }
    .sub   { fill:#475569; }
    .cap   { fill:#64748b; font-weight:600; letter-spacing:.4px; }
    .label { fill:#334155; }
    .mono  { fill:#334155; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .a-flow{ stroke:#6366f1; fill:none; stroke-width:2; }
    .h-flow{ fill:#6366f1; }
    .a-gate{ stroke:#d97706; fill:none; stroke-width:2; stroke-dasharray:5 4; }
    .h-gate{ fill:#d97706; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill:#0b1220; }
      .card { fill:#111827; stroke:#334155; }
      .lake { fill:#1a132e; stroke:#6d28d9; }
      .minio{ fill:#1e1b4b; stroke:#3730a3; }
      .marts{ fill:#052e2b; stroke:#134e4a; }
      .gate { fill:#3b2f0b; stroke:#a16207; }
      .hline{ stroke:#334155; }
      .title { fill:#e2e8f0; }
      .mid   { fill:#cbd5e1; }
      .sub   { fill:#94a3b8; }
      .cap   { fill:#94a3b8; }
      .label { fill:#cbd5e1; }
      .mono  { fill:#cbd5e1; }
      .a-flow{ stroke:#818cf8; }
      .h-flow{ fill:#818cf8; }
      .a-gate{ stroke:#fbbf24; }
      .h-gate{ fill:#fbbf24; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="1480" height="890" rx="14"/>

  <!-- 섹션 캡션 -->
  <text class="cap" x="165" y="46" font-size="12" text-anchor="middle">원천 · PG dbtower (15432)</text>
  <text class="cap" x="490" y="182" font-size="12" text-anchor="middle">raw · MinIO Parquet</text>
  <text class="cap" x="820" y="182" font-size="12" text-anchor="middle">staging · dbt(DuckDB)</text>
  <text class="cap" x="1295" y="62" font-size="12" text-anchor="middle">marts · dbt(contract)</text>
  <text class="cap" x="665" y="512" font-size="12" text-anchor="middle">운영 테이블 — snapshot_offload 성공 시 heartbeat 태스크가 기록</text>

  <!-- ===== database_instance ===== -->
  <rect class="card" x="30" y="62" width="270" height="96" rx="10"/>
  <text class="title" x="165" y="84" font-size="13" text-anchor="middle">database_instance</text>
  <text class="cap" x="165" y="99" font-size="9.5" text-anchor="middle">원천 PG · 인스턴스 레지스트리</text>
  <line class="hline" x1="44" y1="107" x2="286" y2="107"/>
  <text class="mono" x="44" y="124" font-size="11">id</text>
  <text class="sub" x="286" y="124" font-size="10" text-anchor="end">bigint PK</text>
  <text class="sub" x="165" y="144" font-size="9.5" text-anchor="middle">추출은 등록된 id 목록을 인스턴스별로 루프</text>

  <!-- ===== query_snapshot ===== -->
  <rect class="card" x="30" y="210" width="270" height="250" rx="10"/>
  <text class="title" x="165" y="232" font-size="13" text-anchor="middle">query_snapshot</text>
  <text class="cap" x="165" y="247" font-size="9.5" text-anchor="middle">원천 PG · 7일 보존 · 누적 카운터</text>
  <line class="hline" x1="44" y1="255" x2="286" y2="255"/>
  <text class="mono" x="44" y="272" font-size="11">id</text>
  <text class="sub" x="286" y="272" font-size="10" text-anchor="end">bigint PK</text>
  <text class="mono" x="44" y="291" font-size="11">instance_id</text>
  <text class="sub" x="286" y="291" font-size="10" text-anchor="end">bigint FK</text>
  <text class="mono" x="44" y="310" font-size="11">captured_at</text>
  <text class="sub" x="286" y="310" font-size="10" text-anchor="end">timestamp(6) UTC</text>
  <text class="mono" x="44" y="329" font-size="11">query_id</text>
  <text class="sub" x="286" y="329" font-size="10" text-anchor="end">varchar(64)</text>
  <text class="mono" x="44" y="348" font-size="11">query_text</text>
  <text class="sub" x="286" y="348" font-size="10" text-anchor="end">varchar(4000) NULL</text>
  <text class="mono" x="44" y="367" font-size="11">calls</text>
  <text class="sub" x="286" y="367" font-size="10" text-anchor="end">bigint 누적</text>
  <text class="mono" x="44" y="386" font-size="11">total_time_ms</text>
  <text class="sub" x="286" y="386" font-size="10" text-anchor="end">double 누적</text>
  <text class="mono" x="44" y="405" font-size="11">rows_examined</text>
  <text class="sub" x="286" y="405" font-size="10" text-anchor="end">bigint 누적</text>
  <text class="sub" x="165" y="432" font-size="9.5" text-anchor="middle">인덱스 (instance_id, captured_at)</text>

  <!-- FK: query_snapshot.instance_id → database_instance.id -->
  <path class="a-flow" d="M110 210 L110 166"/>
  <polygon class="h-flow" points="110,158 105,168 115,168"/>
  <text class="label" x="120" y="190" font-size="9.5">N:1 (instance_id → id)</text>

  <!-- ===== raw parquet ===== -->
  <rect class="minio" x="350" y="200" width="280" height="270" rx="10"/>
  <text class="title" x="490" y="222" font-size="13" text-anchor="middle">raw/query_snapshot</text>
  <text class="cap" x="490" y="237" font-size="9.5" text-anchor="middle">MinIO Parquet · SNAPSHOT_SCHEMA 고정 선언</text>
  <line class="hline" x1="364" y1="245" x2="616" y2="245"/>
  <text class="mono" x="364" y="262" font-size="11">id</text>
  <text class="sub" x="616" y="262" font-size="10" text-anchor="end">int64</text>
  <text class="mono" x="364" y="281" font-size="11">instance_id</text>
  <text class="sub" x="616" y="281" font-size="10" text-anchor="end">int64</text>
  <text class="mono" x="364" y="300" font-size="11">captured_at</text>
  <text class="sub" x="616" y="300" font-size="10" text-anchor="end">timestamp[us]</text>
  <text class="mono" x="364" y="319" font-size="11">query_id</text>
  <text class="sub" x="616" y="319" font-size="10" text-anchor="end">string</text>
  <text class="mono" x="364" y="338" font-size="11">query_text</text>
  <text class="sub" x="616" y="338" font-size="10" text-anchor="end">string NULL</text>
  <text class="mono" x="364" y="357" font-size="11">calls</text>
  <text class="sub" x="616" y="357" font-size="10" text-anchor="end">int64 누적</text>
  <text class="mono" x="364" y="376" font-size="11">total_time_ms</text>
  <text class="sub" x="616" y="376" font-size="10" text-anchor="end">float64 누적</text>
  <text class="mono" x="364" y="395" font-size="11">rows_examined</text>
  <text class="sub" x="616" y="395" font-size="10" text-anchor="end">int64 누적</text>
  <rect class="gate" x="364" y="408" width="252" height="48" rx="6"/>
  <text class="sub" x="490" y="426" font-size="9.5" text-anchor="middle">파티션 키: dt=YYYY-MM-DD / instance_id=N</text>
  <text class="sub" x="490" y="444" font-size="9.5" text-anchor="middle">Hive 경로 → dt는 varchar로 읽힘(staging에서 캐스팅)</text>

  <!-- ===== stg_query_snapshot ===== -->
  <rect class="card" x="680" y="200" width="280" height="260" rx="10"/>
  <text class="title" x="820" y="222" font-size="13" text-anchor="middle">stg_query_snapshot</text>
  <text class="cap" x="820" y="237" font-size="9.5" text-anchor="middle">dbt staging · 지문 충돌 계열 SUM 정규화</text>
  <line class="hline" x1="694" y1="245" x2="946" y2="245"/>
  <text class="mono" x="694" y="262" font-size="11">instance_id</text>
  <text class="sub" x="946" y="262" font-size="10" text-anchor="end">그룹 키</text>
  <text class="mono" x="694" y="281" font-size="11">query_id</text>
  <text class="sub" x="946" y="281" font-size="10" text-anchor="end">그룹 키</text>
  <text class="mono" x="694" y="300" font-size="11">dt</text>
  <text class="sub" x="946" y="300" font-size="10" text-anchor="end">date 캐스팅 · 그룹 키</text>
  <text class="mono" x="694" y="319" font-size="11">captured_at</text>
  <text class="sub" x="946" y="319" font-size="10" text-anchor="end">그룹 키</text>
  <text class="mono" x="694" y="338" font-size="11">calls</text>
  <text class="sub" x="946" y="338" font-size="10" text-anchor="end">SUM(누적 유지)</text>
  <text class="mono" x="694" y="357" font-size="11">total_time_ms</text>
  <text class="sub" x="946" y="357" font-size="10" text-anchor="end">SUM(누적 유지)</text>
  <text class="mono" x="694" y="376" font-size="11">rows_examined</text>
  <text class="sub" x="946" y="376" font-size="10" text-anchor="end">SUM(누적 유지)</text>
  <text class="mono" x="694" y="395" font-size="11">query_text</text>
  <text class="sub" x="946" y="395" font-size="10" text-anchor="end">MAX(대표값)</text>
  <text class="sub" x="820" y="422" font-size="9.5" text-anchor="middle">그레인: instance_id · query_id · dt · captured_at</text>
  <text class="sub" x="820" y="440" font-size="9.5" text-anchor="middle">단조 비감소 누적 계열 복원(가짜 리셋 제거)</text>

  <!-- ===== fct_query_daily ===== -->
  <rect class="marts" x="1140" y="80" width="310" height="232" rx="10"/>
  <text class="title" x="1295" y="102" font-size="13" text-anchor="middle">fct_query_daily</text>
  <text class="cap" x="1295" y="117" font-size="9.5" text-anchor="middle">contract enforced · 증분(delete+insert)</text>
  <line class="hline" x1="1154" y1="125" x2="1436" y2="125"/>
  <text class="mono" x="1154" y="142" font-size="11">instance_id</text>
  <text class="sub" x="1436" y="142" font-size="10" text-anchor="end">bigint NN</text>
  <text class="mono" x="1154" y="161" font-size="11">query_id</text>
  <text class="sub" x="1436" y="161" font-size="10" text-anchor="end">varchar NN</text>
  <text class="mono" x="1154" y="180" font-size="11">dt</text>
  <text class="sub" x="1436" y="180" font-size="10" text-anchor="end">date NN</text>
  <text class="mono" x="1154" y="199" font-size="11">query_text</text>
  <text class="sub" x="1436" y="199" font-size="10" text-anchor="end">varchar</text>
  <text class="mono" x="1154" y="218" font-size="11">delta_calls</text>
  <text class="sub" x="1436" y="218" font-size="10" text-anchor="end">hugeint NN · CHECK ≥ 0</text>
  <text class="mono" x="1154" y="237" font-size="11">delta_total_time_ms</text>
  <text class="sub" x="1436" y="237" font-size="10" text-anchor="end">double NN · CHECK ≥ 0</text>
  <text class="mono" x="1154" y="256" font-size="11">avg_latency_ms</text>
  <text class="sub" x="1436" y="256" font-size="10" text-anchor="end">double</text>
  <text class="sub" x="1295" y="282" font-size="9.5" text-anchor="middle">그레인: instance × query × dt (하루 1행)</text>
  <text class="sub" x="1295" y="298" font-size="9.5" text-anchor="middle">unique_key = (instance_id, query_id, dt)</text>

  <!-- ===== 누적 → 일간 델타 변환 지점 ===== -->
  <rect class="gate" x="985" y="170" width="140" height="96" rx="10"/>
  <text class="mid" x="1055" y="192" font-size="11" text-anchor="middle">누적 → 일간 델타</text>
