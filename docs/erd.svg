  <text class="sub" x="1055" y="228" font-size="9.5" text-anchor="middle">하루 first/last 차분</text>
  <text class="sub" x="1055" y="246" font-size="9.5" text-anchor="middle">GREATEST(0,…) 클램프</text>
  <path class="a-gate" d="M1055 266 L1055 290"/>

