  <text class="sub" x="1436" y="568" font-size="10" text-anchor="end">date</text>
  <text class="mono" x="1154" y="587" font-size="11">recent_days_seen</text>
  <text class="sub" x="1436" y="587" font-size="10" text-anchor="end">bigint</text>
  <text class="mono" x="1154" y="606" font-size="11">prior_days_seen</text>
  <text class="sub" x="1436" y="606" font-size="10" text-anchor="end">bigint</text>
  <text class="mono" x="1154" y="625" font-size="11">prior_latency_ms</text>
  <text class="sub" x="1436" y="625" font-size="10" text-anchor="end">double</text>
  <text class="mono" x="1154" y="644" font-size="11">recent_latency_ms</text>
  <text class="sub" x="1436" y="644" font-size="10" text-anchor="end">double</text>
  <text class="mono" x="1154" y="663" font-size="11">latency_increase_ms</text>
  <text class="sub" x="1436" y="663" font-size="10" text-anchor="end">double NN</text>
